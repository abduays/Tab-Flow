<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">🌊 TabFlow</div>
      <span class="badge">Free</span>
    </header>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Active Tabs</div><div class="stat-value" id="activeCount">--</div></div>
      <div class="stat-card"><div class="stat-label">Suspended</div><div class="stat-value" id="suspendedCount">--</div></div>
      <div class="stat-card highlight"><div class="stat-label">Memory Freed</div><div class="stat-value" id="memorySaved">-- MB</div></div>
    </div>
    <div class="controls">
      <button id="suspendAll" class="btn primary">⚡ Suspend All Inactive</button>
      <button id="resumeAll" class="btn secondary">↩️ Resume All</button>
    </div>
    <div class="pro-section">
      <p>Unlock custom rules, real-time dashboard & team sync</p>
      <a href="#" class="btn pro-btn" id="upgradeBtn">Upgrade to Pro - $3/mo</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
